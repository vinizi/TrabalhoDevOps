<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Task Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>🎮 Task Game</h1>

        <h2>Nível: <span id="level">1</span></h2>

        <div class="xp-bar">
            <div id="xpFill"></div>
        </div>

        <h2>Pontos: <span id="points">0</span></h2>

        <div class="input-area">
            <input type="text" id="taskInput" placeholder="Digite uma tarefa">
            <button id="addBtn">Adicionar</button>
        </div>

        <ul id="taskList"></ul>
    </div>

    <script src="script.js"></script>
</body>
</html>
